<mat-card class="family-card">
  <div class="family-card-top">
    <div class="family-main">
      <div class="family-heading">
        <h3 class="family-name">{{ family().guardianName }}</h3>
        <span class="status-pill" [ngClass]="statusClass()">{{ statusLabel() }}</span>
      </div>
      <div class="family-meta">
        <span>{{ family().timeSlot }}</span>
        <span>{{ family().students?.length ?? 0 }} student{{ (family().students?.length ?? 0) === 1 ? '' : 's' }}</span>
      </div>
      <p class="family-address">{{ family().address }}</p>
    </div>
    <button mat-flat-button color="primary" class="help-family-button" (click)="helpFamily.emit(family())">
      Help Family
    </button>
  </div>
</mat-card>
