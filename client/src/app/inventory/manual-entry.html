<h2 mat-dialog-title>Manual Entry</h2>
<p class="barcode-ref">Barcode: <strong>{{ data.barcode }}</strong></p>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field>
      <mat-label>Item</mat-label>
      <input matInput formControlName="item" placeholder = "item name" />
      <mat-error *ngIf="form.get('item')?.hasError('required')">Item is required</mat-error>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Brand</mat-label>
      <input matInput formControlName="brand" placeholder = "Brand" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Color</mat-label>
      <input matInput formControlName="color" placeholder = "Color" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Size</mat-label>
      <input matInput formControlName="size" placeholder = "Size" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Type</mat-label>
      <input matInput formControlName="type" placeholder = "Type" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Material</mat-label>
      <input matInput formControlName="material" placeholder = "Material" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Quantity</mat-label>
      <input matInput formControlName="quantity" type="number" placeholder = "Quantity" />
      <mat-error *ngIf="form.get('quantity')?.hasError('required')">Quantity is required</mat-error>
      <mat-error *ngIf="form.get('quantity')?.hasError('min')">Quantity must be at least 1</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click) = "cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()">Save</button>
</mat-dialog-actions>
