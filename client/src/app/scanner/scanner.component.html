<div class="scanner-container">
  <h2>Scan Item - {{ scannerAction() === 'add' ? 'Add' : 'Remove' }}</h2>

  <div class="scan-mode-toolbar">
    <button
      *ngFor="let mode of scanModes"
      type="button"
      (click)="setMode(mode.key)"
      [disabled]="processing"
      [class.active]="activeMode === mode.key"
    >
      {{ mode.label }}
    </button>

    <button
      *ngIf="activeMode"
      type="button"
      (click)="deactivateMode()"
      [disabled]="processing"
    >
      Stop Scan Mode
    </button>
  </div>

  <div *ngIf="!activeMode" class="scan-mode-placeholder">
    <p>Select a scan mode to begin.</p>
  </div>

  <div *ngIf="activeMode === 'camera'" class="camera-panel">
    <h3>Camera Scan</h3>
    <p>Use your device camera to scan item barcodes.</p>

    <video
      #video
      autoplay
      muted
      playsinline
      [style.display]="isScanning ? 'block' : 'none'"
      style="width: 100%; max-width: 700px; height: 320px; border: 2px solid #ccc;"
    ></video>
  </div>

  <div *ngIf="activeMode === 'handheld'" class="handheld-panel">
    <h3>Hand Held Scan</h3>
    <p>Click the box if needed, then scan with the handheld barcode reader.</p>

    <input
      #handheldInput
      type="text"
      [(ngModel)]="handheldInputValue"
      (keydown.enter)="debugEntry(handheldInputValue); submitHandheldScan(handheldInputValue)"
      [disabled]="processing"
      placeholder="Scan barcode here"
      autocomplete="off"
    />
  </div>

  <div *ngIf="getScanEntries().length > 0" class="scanned-items-panel">
    <h3>Scanned Items</h3>

    <div
      *ngFor="let entry of getScanEntries(); trackBy: trackByBarcode"
      class="scanned-item-row"
    >
      <div class="barcode-label">
        {{ entry.key }}
      </div>

      <div class="quantity-input">
        <label [attr.for] = "'qty-' + entry.key">Quantity</label>
        <input
          [id] = "'qty-' + entry.key"
          type="number"
          min="1"
          [ngModel]="entry.value"
          (ngModelChange)="updateScanQuantity(entry.key, $event)"
        />
      </div>
    </div>
  </div>

  <div *ngIf="processing" class="processing-panel">
    <p>Processing scanned items...</p>
  </div>

  <div class="scanner-actions">
    <button
      type="button"
      (click)="onDone()"
      [disabled]="!isScanning || processing"
    >
      Done
    </button>

    <button
      type="button"
      (click)="clearScans()"
      [disabled]="processing"
    >
      Clear
    </button>
  </div>
</div>
