<div class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>{{ pageTitle }}</mat-card-title>
      <mat-card-subtitle>{{ pageSubtitle }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" [formGroup]="signupForm" class="auth-form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" type="text" autocomplete="name">
          <mat-icon matSuffix>badge</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" type="text" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        @if (requiresEmail) {
        <mat-form-field appearance="outline" class="full-width">
          <mat-label required>Email</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" required>
          <mat-icon matSuffix>mail</mat-icon>
        </mat-form-field>
        }
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"
            autocomplete="new-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword"
            [attr.aria-label]="'Toggle password'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (signupForm.get('password')?.hasError('minlength')) {
          <mat-hint>Minimum 8 characters</mat-hint>
          }
        </mat-form-field>

        @if (error) {
        <mat-error class="auth-error">{{ error }}</mat-error>
        }

        <button mat-raised-button color="primary" type="submit" [disabled]="!signupForm.valid || isLoading"
          class="full-width submit-btn">
          @if (isLoading) {
          <mat-progress-spinner diameter="20" mode="indeterminate" />
          } @else {
          Sign Up
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-actions">
      <span class="auth-link-label">Already have an account?</span>
      <a mat-button color="primary" routerLink="/login">Log In</a>
    </mat-card-actions>
  </mat-card>
</div>
